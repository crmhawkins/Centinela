{% extends "base.html" %}
{% block content %}
<h1>Borrar todas las incidencias</h1>
<div class="card" style="max-width:700px;">
  <p style="margin-bottom:1rem; color:#ffb3b3;">
    Esta accion elimina TODO el historial de incidencias de forma inmediata.
  </p>
  <form method="post" action="/incidents/purge" class="filter-form">
    <label style="min-width:260px;">
      Contrasena del panel
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="btn" style="background:#9c2727; color:#fff;">Confirmar borrado total</button>
    <a href="/incidents" class="btn" style="background:#2a2a50; color:#a0b0ff;">Cancelar</a>
  </form>
  {% if error %}
  <p style="margin-top:1rem; color:#ff8f8f;">{{ error }}</p>
  {% endif %}
  {% if ok_message %}
  <p style="margin-top:1rem; color:#8fffaf;">{{ ok_message }}</p>
  {% endif %}
</div>
{% endblock %}
