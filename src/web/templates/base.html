<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CENTINELA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ---- Navigation ---- */
    nav {
      background: #12122a;
      border-bottom: 1px solid #2e2e5e;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #7b8cde;
      text-decoration: none;
      text-transform: uppercase;
    }

    nav a {
      color: #a0a8d0;
      text-decoration: none;
      padding: 0.35rem 0.75rem;
      border-radius: 4px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    nav a:hover, nav a.active {
      background: #2a2a50;
      color: #e0e4ff;
    }

    /* ---- Main content ---- */
    main {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #c0c8f0;
    }

    h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #a0a8d0;
    }

    /* ---- Cards / panels ---- */
    .card {
      background: #16213e;
      border: 1px solid #2a2a50;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    /* ---- Severity color badge ---- */
    .badge {
      display: inline-block;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-critical { background: #ff4444; color: #fff; }
    .badge-high     { background: #ff8800; color: #fff; }
    .badge-medium   { background: #ffcc00; color: #111; }
    .badge-low      { background: #44ff88; color: #111; }
    .badge-unknown  { background: #888;    color: #fff; }

    /* ---- Tables ---- */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead th {
      background: #0f0f28;
      color: #8090c0;
      text-align: left;
      padding: 0.6rem 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #2a2a50;
    }

    tbody tr {
      border-bottom: 1px solid #1e1e40;
    }

    tbody tr:hover {
      background: #1e2244;
    }

    tbody td {
      padding: 0.55rem 0.75rem;
      vertical-align: middle;
    }

    /* ---- Links ---- */
    a { color: #7b8cde; text-decoration: none; }
    a:hover { color: #aab4ff; text-decoration: underline; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #3a4ccc;
      color: #fff;
    }
    .btn-primary:hover { background: #4a5cdc; }

    .btn-sm {
      padding: 0.25rem 0.65rem;
      font-size: 0.78rem;
    }

    /* ---- Forms ---- */
    input[type="text"], select {
      background: #0f0f28;
      border: 1px solid #2a2a50;
      border-radius: 4px;
      color: #e0e0f0;
      padding: 0.4rem 0.65rem;
      font-size: 0.88rem;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #5060cc;
    }

    .filter-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: flex-end;
      margin-bottom: 1rem;
    }

    .filter-form label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.78rem;
      color: #8090c0;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* ---- Severity stat cards ---- */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: #16213e;
      border: 1px solid #2a2a50;
      border-radius: 8px;
      padding: 1.2rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .stat-card .label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-card .count {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-card.critical { border-left: 4px solid #ff4444; }
    .stat-card.critical .label { color: #ff4444; }
    .stat-card.critical .count { color: #ff6666; }

    .stat-card.high { border-left: 4px solid #ff8800; }
    .stat-card.high .label { color: #ff8800; }
    .stat-card.high .count { color: #ffaa44; }

    .stat-card.medium { border-left: 4px solid #ffcc00; }
    .stat-card.medium .label { color: #ffcc00; }
    .stat-card.medium .count { color: #ffdd44; }

    .stat-card.low { border-left: 4px solid #44ff88; }
    .stat-card.low .label { color: #44ff88; }
    .stat-card.low .count { color: #66ffaa; }

    /* ---- Two-column grid for tables ---- */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 800px) {
      .two-col { grid-template-columns: 1fr; }
      .stat-cards { grid-template-columns: 1fr 1fr; }
    }

    /* ---- Pagination ---- */
    .pagination {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
      font-size: 0.88rem;
      color: #8090c0;
    }

    /* ---- Filter tags ---- */
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }

    .filter-tag {
      background: #2a2a50;
      border-radius: 4px;
      padding: 0.2em 0.6em;
      font-size: 0.78rem;
      color: #a0b0ff;
    }

    /* ---- Detail page ---- */
    .meta-table td:first-child {
      font-weight: 600;
      color: #8090c0;
      white-space: nowrap;
      padding-right: 1.5rem;
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    pre {
      background: #0f0f28;
      border: 1px solid #2a2a50;
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 0.82rem;
      color: #b0c8ff;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .detail-header h1 { margin-bottom: 0; }

    .status-form {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .empty-state {
      color: #506080;
      font-style: italic;
      padding: 2rem 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">&#9673; Centinela</a>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
    <a href="/incidents" {% if request.url.path.startswith("/incidents") %}class="active"{% endif %}>Incidents</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
