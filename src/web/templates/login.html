<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CENTINELA - Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .card {
      width: min(420px, 92vw);
      background: #16213e;
      border: 1px solid #2a2a50;
      border-radius: 10px;
      padding: 1.4rem;
    }
    h1 {
      margin: 0 0 1rem 0;
      font-size: 1.2rem;
      color: #c0c8f0;
    }
    label {
      display: block;
      margin: 0.6rem 0 0.25rem;
      font-size: 0.86rem;
      color: #9aa6d8;
    }
    input {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border-radius: 6px;
      border: 1px solid #2a2a50;
      background: #0f0f28;
      color: #e0e0f0;
    }
    .btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.6rem;
      border: 0;
      border-radius: 6px;
      background: #3a4ccc;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      margin-top: 0.8rem;
      color: #ff7f7f;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <form method="post" action="/login" class="card">
    <h1>Acceso a CENTINELA</h1>
    <input type="hidden" name="next" value="{{ next_url }}">
    <label>Usuario</label>
    <input type="text" name="username" required autofocus>
    <label>Contrasena</label>
    <input type="password" name="password" required>
    <button class="btn" type="submit">Entrar</button>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </form>
</body>
</html>
